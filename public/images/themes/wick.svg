<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Wick theme preview">
  <defs>
    <radialGradient id="wGlow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#d99a4e" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#d99a4e" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d99a4e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wJar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4f28"/><stop offset="0.45" stop-color="#5a3a1e"/><stop offset="1" stop-color="#3a2513"/>
    </linearGradient>
    <linearGradient id="wJar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5c30"/><stop offset="1" stop-color="#452c16"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#17120e"/>
  <!-- ticker -->
  <rect width="400" height="18" fill="#0f0b08"/>
  <text x="14" y="13" font-family="'Space Mono',monospace" font-size="8" letter-spacing="1.2" fill="#b3a48e">SMALL-BATCH SOY WAX &#183; POURED BY HAND &#183; COTTON WICKS</text>
  <!-- header -->
  <line x1="0" y1="58" x2="400" y2="58" stroke="#3a2e20" stroke-width="1"/>
  <text x="24" y="45" font-family="'Fraunces',serif" font-weight="600" font-size="21" fill="#f2e8d8">Wick<tspan fill="#d99a4e">.</tspan></text>
  <text x="212" y="43" font-family="'Hanken Grotesk',sans-serif" font-size="9" fill="#b3a48e">Candles&#160;&#160;Home Fragrance&#160;&#160;Accessories</text>
  <circle cx="376" cy="40" r="8" fill="#d99a4e"/>
  <text x="373" y="43" font-family="'Hanken Grotesk',sans-serif" font-size="8" fill="#17120e">2</text>
  <!-- candle glow -->
  <ellipse cx="300" cy="150" rx="130" ry="110" fill="url(#wGlow)"/>
  <!-- hero -->
  <text x="24" y="100" font-family="'Space Mono',monospace" font-size="8" letter-spacing="2" fill="#d99a4e">// CANDLELIT APOTHECARY</text>
  <text x="24" y="138" font-family="'Fraunces',serif" font-weight="600" font-size="36" fill="#f2e8d8">Lit, not</text>
  <text x="24" y="176" font-family="'Fraunces',serif" font-style="italic" font-weight="500" font-size="36" fill="#d99a4e">loud.</text>
  <rect x="24" y="196" width="104" height="24" rx="12" fill="#d99a4e"/>
  <text x="76" y="212" text-anchor="middle" font-family="'Hanken Grotesk',sans-serif" font-size="9" font-weight="700" fill="#17120e">Shop the bench</text>
  <!-- amber jars with flame -->
  <g>
    <rect x="262" y="112" width="52" height="76" rx="8" fill="url(#wJar)"/>
    <rect x="262" y="106" width="52" height="10" rx="4" fill="#2c2218"/>
    <ellipse cx="288" cy="112" rx="5" ry="8" fill="#f4c26a"/>
    <ellipse cx="288" cy="110" rx="2" ry="4" fill="#fbe6b8"/>
    <rect x="268" y="132" width="40" height="34" rx="2" fill="#f2e8d8"/>
    <text x="288" y="145" text-anchor="middle" font-family="'Space Mono',monospace" font-size="6" fill="#8a7257">WICK</text>
    <text x="288" y="156" text-anchor="middle" font-family="'Fraunces',serif" font-style="italic" font-size="9" fill="#2c2218">Hearth</text>
    <text x="288" y="163" text-anchor="middle" font-family="'Space Mono',monospace" font-size="5" fill="#8a7257">BATCH &#8470; 01</text>
  </g>
  <g>
    <rect x="326" y="132" width="40" height="56" rx="6" fill="url(#wJar2)"/>
    <rect x="326" y="127" width="40" height="8" rx="3" fill="#2c2218"/>
    <rect x="331" y="146" width="30" height="26" rx="2" fill="#f2e8d8"/>
    <text x="346" y="157" text-anchor="middle" font-family="'Fraunces',serif" font-style="italic" font-size="8" fill="#2c2218">Library</text>
    <text x="346" y="165" text-anchor="middle" font-family="'Space Mono',monospace" font-size="5" fill="#8a7257">&#8470; 02</text>
  </g>
  <!-- metabar -->
  <line x1="24" y1="238" x2="376" y2="238" stroke="#3a2e20" stroke-width="1"/>
  <text x="24" y="256" font-family="'Space Mono',monospace" font-size="8" fill="#b3a48e">7 SCENTS</text>
  <text x="140" y="256" font-family="'Space Mono',monospace" font-size="8" fill="#b3a48e">40H BURN</text>
  <text x="256" y="256" font-family="'Space Mono',monospace" font-size="8" fill="#b3a48e">POURED BY HAND</text>
  <!-- product row -->
  <g>
    <rect x="24" y="268" width="110" height="24" rx="4" fill="#221a13" stroke="#3a2e20"/>
    <text x="34" y="283" font-family="'Fraunces',serif" font-size="9" fill="#f2e8d8">Orchard Dusk</text>
    <text x="122" y="283" text-anchor="end" font-family="'Hanken Grotesk',sans-serif" font-weight="600" font-size="9" fill="#d99a4e">&#8364;32</text>
  </g>
  <g>
    <rect x="145" y="268" width="110" height="24" rx="4" fill="#221a13" stroke="#3a2e20"/>
    <text x="155" y="283" font-family="'Fraunces',serif" font-size="9" fill="#f2e8d8">Black Honey</text>
    <text x="243" y="283" text-anchor="end" font-family="'Hanken Grotesk',sans-serif" font-weight="600" font-size="9" fill="#d99a4e">&#8364;36</text>
  </g>
  <g>
    <rect x="266" y="268" width="110" height="24" rx="4" fill="#221a13" stroke="#3a2e20"/>
    <text x="276" y="283" font-family="'Fraunces',serif" font-size="9" fill="#f2e8d8">Chapel Incense</text>
    <text x="364" y="283" text-anchor="end" font-family="'Hanken Grotesk',sans-serif" font-weight="600" font-size="9" fill="#d99a4e">&#8364;18</text>
  </g>
