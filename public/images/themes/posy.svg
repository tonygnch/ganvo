<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Posy theme preview">
  <rect width="400" height="300" fill="#eef0e4"/>
  <!-- ticker -->
  <rect x="0" y="0" width="400" height="18" fill="#222b1a"/>
  <text x="14" y="13" font-family="'Hanken Grotesk',sans-serif" font-size="9" letter-spacing="1.2" fill="#e2e6d4">CUT TO ORDER &#10047; SAME-DAY DELIVERY &#10047; LOCAL GROWERS</text>
  <!-- header -->
  <rect x="0" y="18" width="400" height="40" fill="#eef0e4"/>
  <line x1="0" y1="58" x2="400" y2="58" stroke="#d2d8c2" stroke-width="1"/>
  <text x="24" y="45" font-family="'DM Serif Display',serif" font-size="22" fill="#28321f">Posy</text>
  <text x="250" y="43" font-family="'Hanken Grotesk',sans-serif" font-size="9" fill="#28321f">Bouquets&#160;&#160;Plants&#160;&#160;Dried</text>
  <circle cx="372" cy="40" r="8" fill="#4a6b3c"/>
  <text x="369" y="43" font-family="'Hanken Grotesk',sans-serif" font-size="8" fill="#fbfcf5">2</text>

  <!-- hero lead -->
  <text x="200" y="96" text-anchor="middle" font-family="'Hanken Grotesk',sans-serif" font-size="8" letter-spacing="2" fill="#4a6b3c">SEASONAL &#183; LOCALLY GROWN</text>
  <text x="200" y="126" text-anchor="middle" font-family="'DM Serif Display',serif" font-size="30" fill="#28321f">Flowers,</text>
  <text x="200" y="156" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-style="italic" font-size="30" fill="#4a6b3c">freshly<tspan font-family="'DM Serif Display',serif" font-style="normal" fill="#28321f"> gathered.</tspan></text>
  <rect x="150" y="172" width="100" height="22" rx="11" fill="#4a6b3c"/>
  <text x="200" y="187" text-anchor="middle" font-family="'Hanken Grotesk',sans-serif" font-size="9" font-weight="600" fill="#fbfcf5">Shop bouquets</text>

  <!-- floating collage dots -->
  <circle cx="300" cy="92" r="22" fill="#cf8f6e"/>
  <circle cx="92" cy="150" r="15" fill="#5d7a44"/>

  <!-- polaroid product cards -->
  <g transform="rotate(-6 70 250)">
    <rect x="34" y="214" width="72" height="84" rx="4" fill="#fbfcf5"/>
    <rect x="40" y="220" width="60" height="52" rx="2" fill="#cf8f6e"/>
    <rect x="58" y="208" width="24" height="7" fill="#788c5a" opacity="0.32"/>
    <text x="70" y="285" text-anchor="middle" font-family="'DM Serif Display',serif" font-size="9" fill="#28321f">Wildling</text>
    <text x="70" y="294" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-size="9" fill="#4a6b3c">$62</text>
  </g>
  <g transform="rotate(3 200 252)">
    <rect x="162" y="216" width="76" height="84" rx="4" fill="#fbfcf5"/>
    <rect x="168" y="222" width="64" height="52" rx="2" fill="#5d7a44"/>
    <text x="200" y="287" text-anchor="middle" font-family="'DM Serif Display',serif" font-size="9" fill="#28321f">Olive Tree</text>
    <text x="200" y="296" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-size="9" fill="#4a6b3c">$48</text>
  </g>
  <g transform="rotate(-3 330 250)">
    <rect x="294" y="214" width="72" height="84" rx="4" fill="#fbfcf5"/>
    <rect x="300" y="220" width="60" height="52" rx="2" fill="#cf8f6e"/>
    <rect x="318" y="208" width="24" height="7" fill="#788c5a" opacity="0.32"/>
    <text x="330" y="285" text-anchor="middle" font-family="'DM Serif Display',serif" font-size="9" fill="#28321f">Brightside</text>
    <text x="330" y="294" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-size="9" fill="#4a6b3c">$58</text>
  </g>
