<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Timber theme preview">
  <defs>
    <linearGradient id="tBoard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2d4b2"/>
      <stop offset="0.5" stop-color="#c9b489"/>
      <stop offset="1" stop-color="#d6c49c"/>
    </linearGradient>
    <linearGradient id="tTreated" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfa168"/>
      <stop offset="1" stop-color="#b57a34"/>
    </linearGradient>
  </defs>
  <!-- paper canvas -->
  <rect width="400" height="300" fill="#f3efe6"/>
  <!-- faint grain striations -->
  <g stroke="#7a603a" stroke-width="1" opacity="0.05">
    <line x1="40" y1="0" x2="36" y2="300"/><line x1="110" y1="0" x2="106" y2="300"/>
    <line x1="180" y1="0" x2="176" y2="300"/><line x1="250" y1="0" x2="246" y2="300"/>
    <line x1="320" y1="0" x2="316" y2="300"/><line x1="380" y1="0" x2="376" y2="300"/>
  </g>
  <!-- header bar -->
  <rect x="0" y="0" width="400" height="34" fill="#faf7f0"/>
  <line x1="0" y1="34" x2="400" y2="34" stroke="#d9cfba" stroke-width="1"/>
  <rect x="18" y="12" width="64" height="10" rx="2" fill="#2a2118"/>
  <rect x="250" y="13" width="34" height="8" rx="2" fill="#94866c"/>
  <rect x="294" y="13" width="34" height="8" rx="2" fill="#94866c"/>
  <rect x="340" y="10" width="42" height="14" rx="3" fill="#b57a34"/>
  <!-- headline block -->
  <rect x="18" y="62" width="150" height="20" rx="2" fill="#2a2118"/>
  <rect x="18" y="88" width="118" height="20" rx="2" fill="#8a5f36"/>
  <rect x="18" y="120" width="132" height="7" rx="2" fill="#94866c" opacity="0.6"/>
  <rect x="18" y="133" width="110" height="7" rx="2" fill="#94866c" opacity="0.6"/>
  <rect x="18" y="156" width="70" height="22" rx="4" fill="#b57a34"/>
  <rect x="96" y="156" width="70" height="22" rx="4" fill="none" stroke="#bfb094" stroke-width="1.5"/>
  <!-- plank stack -->
  <g>
    <rect x="216" y="66" width="150" height="22" rx="3" fill="url(#tBoard)" stroke="#5a4426" stroke-opacity="0.4"/>
    <rect x="226" y="94" width="150" height="22" rx="3" fill="url(#tBoard)" stroke="#5a4426" stroke-opacity="0.4"/>
    <rect x="212" y="122" width="150" height="22" rx="3" fill="url(#tBoard)" stroke="#5a4426" stroke-opacity="0.4"/>
    <rect x="222" y="150" width="150" height="22" rx="3" fill="url(#tTreated)" stroke="#5a4426" stroke-opacity="0.4"/>
    <rect x="216" y="178" width="150" height="22" rx="3" fill="url(#tTreated)" stroke="#5a4426" stroke-opacity="0.4"/>
  </g>
  <!-- end-grain rings -->
  <g fill="none" stroke="#8a5f36" opacity="0.55">
    <circle cx="352" cy="66" r="26" stroke-width="2"/>
    <circle cx="352" cy="66" r="17" stroke-width="1.5"/>
    <circle cx="352" cy="66" r="9" stroke-width="1"/>
  </g>
  <!-- grading stamp -->
  <g transform="rotate(-10 258 196)">
    <circle cx="258" cy="196" r="27" fill="#f7f1e2" fill-opacity="0.85" stroke="#8a5f36" stroke-width="2.5"/>
    <text x="258" y="193" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#8a5f36">C24</text>
    <text x="258" y="205" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a5f36">· KD ·</text>
  </g>
  <!-- product cards row -->
  <g>
    <rect x="18" y="216" width="86" height="62" rx="5" fill="#faf7f0" stroke="#d9cfba"/>
    <rect x="26" y="224" width="70" height="30" rx="3" fill="url(#tBoard)"/>
    <rect x="26" y="260" width="46" height="7" rx="2" fill="#2a2118"/>
    <rect x="118" y="216" width="86" height="62" rx="5" fill="#faf7f0" stroke="#d9cfba"/>
    <rect x="126" y="224" width="70" height="30" rx="3" fill="url(#tTreated)"/>
    <rect x="126" y="260" width="46" height="7" rx="2" fill="#2a2118"/>
    <rect x="218" y="216" width="86" height="62" rx="5" fill="#faf7f0" stroke="#d9cfba" opacity="0.75"/>
    <rect x="226" y="224" width="70" height="30" rx="3" fill="url(#tBoard)" opacity="0.75"/>
    <rect x="226" y="260" width="46" height="7" rx="2" fill="#2a2118" opacity="0.75"/>
  </g>
  <!-- ruler ticks along the bottom -->
  <g stroke="#bfb094" stroke-width="1">
    <line x1="0" y1="292" x2="400" y2="292"/>
    <line x1="20" y1="286" x2="20" y2="292"/><line x1="40" y1="289" x2="40" y2="292"/><line x1="60" y1="289" x2="60" y2="292"/>
    <line x1="80" y1="286" x2="80" y2="292"/><line x1="100" y1="289" x2="100" y2="292"/><line x1="120" y1="289" x2="120" y2="292"/>
    <line x1="140" y1="286" x2="140" y2="292"/><line x1="160" y1="289" x2="160" y2="292"/><line x1="180" y1="289" x2="180" y2="292"/>
    <line x1="200" y1="286" x2="200" y2="292"/><line x1="220" y1="289" x2="220" y2="292"/><line x1="240" y1="289" x2="240" y2="292"/>
    <line x1="260" y1="286" x2="260" y2="292"/><line x1="280" y1="289" x2="280" y2="292"/><line x1="300" y1="289" x2="300" y2="292"/>
    <line x1="320" y1="286" x2="320" y2="292"/><line x1="340" y1="289" x2="340" y2="292"/><line x1="360" y1="289" x2="360" y2="292"/>
    <line x1="380" y1="286" x2="380" y2="292"/>
  </g>
</svg>
